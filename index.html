<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>One More Chance?</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    position: relative;
    color: #fff;

    background: url('image/1.jpg') no-repeat center center;
    background-size: cover;
}

/* Floating hearts */
.heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: #FFC0CB;
    transform: rotate(45deg);
    animation: float 6s linear infinite;
}
.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: #FFC0CB;
    border-radius: 50%;
}
.heart::before { top: -10px; left: 0; }
.heart::after { left: 10px; top: 0; }

@keyframes float {
    0% { transform: translateY(100vh) rotate(45deg); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-100vh) rotate(45deg); opacity: 0; }
}

/* Card */
.card {
    background: rgba(255, 255, 255, 0.95);
    color: #333;
    padding: 25px 20px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    max-width: 300px;
    text-align: center;
    z-index: 5;
    position: relative;
}
.card img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 15px;
}
h2 { margin-bottom: 20px; font-size: 22px; }

/* Buttons */
button {
    padding: 10px 25px;
    margin: 10px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
}

.yes { background-color: #4CAF50; color: white; }

/* NO button */
.no {
    background-color: #f44336;
    color: white;
    position: fixed;
    left: 50%;
    top: 70%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    padding: 18px 35px;
    font-size: 20px;
    border-radius: 15px;
    z-index: 9999;
}
</style>
</head>

<body>

<!-- 🎵 Background Music -->
<audio id="bgMusic" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <img src="image/1.jpg" alt="Memories">

    <h2 id="question">Do you miss me?</h2>
    <button class="yes" onclick="nextStep()">Yes</button>
</div>

<button class="no">No</button>

<script>
// Enable music on user interaction (browser policy fix)
document.addEventListener("click", () => {
    document.getElementById("bgMusic").play();
});

// Questions
let step = 0;
let yesSize = 16;

const questions = [
    "Do you miss me?",
    "Do you remember our good memories?",
    "Can we fix what went wrong?",
    "Can you give us one more chance?"
];

// Typing effect
function typeText(text) {
    let i = 0;
    const el = document.getElementById("question");
    el.innerText = "";

    function typing() {
        if(i < text.length) {
            el.innerText += text.charAt(i);
            i++;
            setTimeout(typing, 40);
        }
    }
    typing();
}

// YES button click
function nextStep() {
    step++;

    // Grow button
    yesSize += 6;
    const yesBtn = document.querySelector(".yes");
    yesBtn.style.fontSize = yesSize + "px";
    yesBtn.style.padding = (10 + yesSize/3) + "px";

    if(step < questions.length) {
        typeText(questions[step]);
    } else {
        document.querySelector(".card").innerHTML = `
            <h2>❤️ Thank you...</h2>
            <p>I promise to do better this time.</p>
        `;
    }
}

// NO button animation
const noBtn = document.querySelector(".no");
let posX = window.innerWidth / 2;
let posY = window.innerHeight * 0.7;
let mouseX = 0, mouseY = 0;
const edgePadding = 20;

document.addEventListener("mousemove", e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function animate() {
    const rect = noBtn.getBoundingClientRect();
    const btnX = posX + rect.width / 2;
    const btnY = posY + rect.height / 2;

    const dx = mouseX - btnX;
    const dy = mouseY - btnY;
    const distance = Math.hypot(dx, dy);

    if(distance < 150) {
        const angle = Math.atan2(dy, dx);
        const speed = (150 - distance) / 2 + 7;

        posX -= Math.cos(angle) * speed;
        posY -= Math.sin(angle) * speed;

        const maxX = window.innerWidth - rect.width - edgePadding;
        const maxY = window.innerHeight - rect.height - edgePadding;

        posX = Math.max(edgePadding, Math.min(posX, maxX));
        posY = Math.max(edgePadding, Math.min(posY, maxY));
    }

    noBtn.style.left = posX + "px";
    noBtn.style.top = posY + "px";

    requestAnimationFrame(animate);
}
animate();

// Floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = 4 + Math.random() * 4 + "s";
    heart.style.width = 10 + Math.random() * 20 + "px";
    heart.style.height = heart.style.width;

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
}
setInterval(createHeart, 300);
</script>

</body>
</html>
